<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan je Afspraak - Vitaal Fysiotherapie</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #20294e;
            --orange: #ec652a;
            --tiffany: #89ccca;
            --background: #fcf8f3;
            --text-dark: #393939;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background: var(--background);
            color: var(--text-dark);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo img {
            max-width: 180px;
        }

        h1 {
            color: var(--primary);
            font-size: 28px;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: var(--primary);
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Open Sans', sans-serif;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--orange);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .submit-btn {
            width: 100%;
            background: var(--orange);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(236, 101, 42, 0.3);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(236, 101, 42, 0.4);
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            color: #d32f2f;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .required {
            color: var(--orange);
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }
            h1 {
                font-size: 24px;
            }
        }
    </style>

    <!-- Meta Pixel -->
    <script src="/js/meta-pixel.js"></script>
    <noscript>
        <img height="1" width="1" style="display:none"
             src="https://www.facebook.com/tr?id=662300986944267&ev=PageView&noscript=1"/>
    </noscript>
    <!-- End Meta Pixel -->
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="images/Logo Vitaal.jpg" alt="Vitaal Fysiotherapie">
        </div>
        
        <h1>Meld je aan voor meer informatie</h1>
        <p class="subtitle">Vul het formulier in en wij nemen contact met je op om een afspraak te maken</p>

        <div style="background:#f0f4f8;border-radius:10px;padding:20px 24px;margin-bottom:28px;">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
                <span style="color:#ec652a;font-weight:700;font-size:16px;">&#10003;</span>
                <span style="font-size:14px;color:#393939;">Ontdek wat er nodig is om je doelen te bereiken</span>
            </div>
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
                <span style="color:#ec652a;font-weight:700;font-size:16px;">&#10003;</span>
                <span style="font-size:14px;color:#393939;">Rondleiding/intake</span>
            </div>
            <div style="display:flex;align-items:center;gap:10px;">
                <span style="color:#ec652a;font-weight:700;font-size:16px;">&#10003;</span>
                <span style="font-size:14px;color:#393939;">Informatie over tijden en tarieven</span>
            </div>
        </div>

        <form id="appointmentForm" action="/leads" method="POST">
            <input type="hidden" id="praktijk_code" name="praktijk_code" value="T6PV9A">

            <div class="form-group">
                <label for="volledige_naam">Volledige naam <span class="required">*</span></label>
                <input type="text" id="volledige_naam" name="volledige_naam" required>
                <span class="error-message" id="error-volledige_naam">Vul je volledige naam in</span>
            </div>

            <div class="form-group">
                <label for="emailadres">E-mailadres <span class="required">*</span></label>
                <input type="email" id="emailadres" name="emailadres" required>
                <span class="error-message" id="error-emailadres">Vul een geldig e-mailadres in</span>
            </div>

            <div class="form-group">
                <label for="telefoon">Telefoonnummer <span class="required">*</span></label>
                <input type="tel" id="telefoon" name="telefoon" required>
                <span class="error-message" id="error-telefoon">Vul je telefoonnummer in</span>
            </div>







            <div class="form-group">
                <label style="display:flex;align-items:flex-start;gap:10px;font-weight:normal;cursor:pointer;">
                    <input type="checkbox" id="toestemming" name="toestemming" value="true" required style="width:auto;margin-top:3px;flex-shrink:0;">
                    <span>Ik ga akkoord met de privacyverklaring en geef toestemming om contact met mij op te nemen voor meer informatie.</span>
                </label>
            </div>

            <button type="submit" class="submit-btn">Verstuur aanvraag</button>
        </form>
    </div>

    <script>
        document.getElementById('appointmentForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = this.querySelector('.submit-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Bezig met versturen...';
            
            // Genereer unieke event_id voor deduplicatie tussen pixel en CAPI
            const eventId = 'dhc_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            
            const formData = new FormData(this);
            const data = Object.fromEntries(formData);
            data.meta_event_id = eventId;
            data.event_source_url = window.location.href;
            
            try {
                const response = await fetch('/leads', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    window.location.href = 'thankyou.html?s=T6PV9A&eid=' + encodeURIComponent(eventId);
                } else {
                    alert('Er ging iets mis. Probeer het opnieuw.');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Verstuur aanvraag';
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Er ging iets mis. Probeer het opnieuw.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Verstuur aanvraag';
            }
        });

        // Client-side validation
        document.querySelectorAll('input[required], select[required]').forEach(field => {
            field.addEventListener('blur', function() {
                const errorMsg = document.getElementById(`error-${this.id}`);
                if (!this.value.trim()) {
                    this.style.borderColor = '#d32f2f';
                    if (errorMsg) errorMsg.style.display = 'block';
                } else {
                    this.style.borderColor = '#e0e0e0';
                    if (errorMsg) errorMsg.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
