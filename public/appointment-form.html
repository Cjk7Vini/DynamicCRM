<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Afspraak Plannen | Dynamic Health</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "DM Sans", -apple-system, sans-serif;
      background: #f4f5f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      width: 100%;
      max-width: 520px;
      overflow: hidden;
    }
    .card-header {
      background: #1A1D21;
      padding: 20px 28px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .card-header img { height: 32px; width: auto; }
    .card-header span { color: white; font-size: 14px; font-weight: 500; }
    .card-body { padding: 28px; }
    .page-title { font-size: 18px; font-weight: 600; color: #111827; margin-bottom: 4px; }
    .page-sub { font-size: 13px; color: #6b7280; margin-bottom: 24px; }

    .lead-box {
      background: #f9f9fb;
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 24px;
      border: 1px solid #e8e8ed;
    }
    .lead-box-title {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .5px; color: #9090a8; margin-bottom: 12px;
    }
    .lead-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 14px; }
    .lead-row:not(:last-child) { border-bottom: 1px solid #f0f1f4; }
    .lead-label { color: #6b7280; }
    .lead-value { font-weight: 500; color: #111827; }

    .form-group { margin-bottom: 16px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; color: #6b7280; margin-bottom: 5px; }
    input, select, textarea {
      width: 100%; padding: 10px 12px; border: 1px solid #e2e4e9;
      border-radius: 8px; font-size: 14px; font-family: inherit;
      color: #111827; background: white; transition: border-color .15s; outline: none;
    }
    input:focus, select:focus, textarea:focus { border-color: #333399; box-shadow: 0 0 0 3px rgba(51,51,153,.08); }
    textarea { resize: vertical; min-height: 80px; }

    .btn {
      width: 100%; padding: 12px; background: #333399; color: white;
      border: none; border-radius: 8px; font-size: 15px; font-family: inherit;
      font-weight: 600; cursor: pointer; transition: opacity .15s; margin-top: 4px;
    }
    .btn:hover { opacity: .9; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .msg { padding: 12px 14px; border-radius: 8px; font-size: 14px; margin-top: 14px; display: none; }
    .msg.error { background: #fee2e2; color: #7f1d1d; border: 1px solid #fecaca; display: block; }
    .msg.success { background: #dcfce7; color: #166534; border: 1px solid #86efac; display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <img src="images/dynamic-logo-2.png" alt="Dynamic Health" onerror="this.style.display='none'">
      <span>Dynamic Health Consultancy</span>
    </div>
    <div class="card-body">
      <div class="page-title">Afspraak plannen</div>
      <div class="page-sub">Plan de afspraak met de lead hieronder</div>

      <div class="lead-box" id="leadBox">
        <div class="lead-box-title">Leadgegevens</div>
        <div class="lead-row"><span class="lead-label">Naam</span><span class="lead-value" id="leadName">—</span></div>
        <div class="lead-row"><span class="lead-label">Email</span><span class="lead-value" id="leadEmail">—</span></div>
        <div class="lead-row"><span class="lead-label">Telefoon</span><span class="lead-value" id="leadPhone">—</span></div>
      </div>

      <div id="appointmentForm">
        <div class="form-row">
          <div>
            <label>Datum *</label>
            <input type="date" id="date" required>
          </div>
          <div>
            <label>Tijd *</label>
            <input type="time" id="time" required>
          </div>
        </div>

        <div class="form-group">
          <label>Type afspraak *</label>
          <select id="type" required>
            <option value="">Kies een type...</option>
            <option value="vitaliteitscheck">Vitaliteitscheck (gratis) – Ontdek in 60 minuten waar jouw verbeterpunten liggen</option>
            <option value="rondleiding">Rondleiding – Ervaar onze locatie en ontdek hoe wij werken aan gezondheid, kracht en balans (30 minuten)</option>
          </select>
        </div>

        <div class="form-group">
          <label>Opmerkingen (optioneel)</label>
          <textarea id="notes" placeholder="Bijv. kom 10 minuten eerder, neem sportkleding mee..."></textarea>
        </div>

        <button class="btn" id="submitBtn" onclick="submitForm()">Afspraak bevestigen</button>
        <div id="message" class="msg"></div>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const leadId = params.get('lead_id');
    const practiceCode = params.get('practice_code');
    const token = params.get('token');

    if (!leadId || !practiceCode || !token) {
      document.getElementById('message').textContent = 'Ongeldige link.';
      document.getElementById('message').className = 'msg error';
      document.getElementById('appointmentForm').style.display = 'none';
    }

    document.getElementById('date').min = new Date().toISOString().split('T')[0];

    async function loadLead() {
      try {
        const res = await fetch(`/api/lead-info?lead_id=${leadId}&practice_code=${practiceCode}&token=${token}`);
        if (!res.ok) throw new Error();
        const d = await res.json();
        document.getElementById('leadName').textContent = d.volledige_naam || '—';
        document.getElementById('leadEmail').textContent = d.emailadres || '—';
        document.getElementById('leadPhone').textContent = d.telefoon || '—';
      } catch {
        document.getElementById('leadBox').innerHTML = '<p style="color:#b91c1c;font-size:13px;">Kon leadgegevens niet laden.</p>';
      }
    }

    async function submitForm() {
      const btn = document.getElementById('submitBtn');
      const msg = document.getElementById('message');
      msg.className = 'msg';
      btn.disabled = true;
      btn.textContent = 'Bezig...';

      try {
        const res = await fetch('/api/confirm-appointment', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            lead_id: leadId, practice_code: practiceCode, token,
            date: document.getElementById('date').value,
            time: document.getElementById('time').value,
            type: document.getElementById('type').value,
            notes: document.getElementById('notes').value
          })
        });
        const result = await res.json();
        if (!res.ok) throw new Error(result.error || 'Er ging iets mis');
        msg.textContent = 'Afspraak bevestigd. De lead ontvangt een bevestigingsmail.';
        msg.className = 'msg success';
        setTimeout(() => {
          window.location.href = `/success.html?name=${encodeURIComponent(result.lead_name)}&lead_id=${leadId}&practice_code=${practiceCode}&practice_name=${encodeURIComponent(result.practice_name)}`;
        }, 2000);
      } catch (e) {
        msg.textContent = e.message;
        msg.className = 'msg error';
        btn.disabled = false;
        btn.textContent = 'Afspraak bevestigen';
      }
    }

    loadLead();
  </script>
</body>
</html>
