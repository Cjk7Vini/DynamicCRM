<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Dynamic Health Consultancy</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #333399 0%, #3399CC 50%, #99CC33 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 420px;
      padding: 40px;
    }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo img { max-width: 180px; height: auto; margin-bottom: 12px; }
    .logo p { color: #666; font-size: 14px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 6px; color: #333; font-weight: 500; font-size: 14px; }
    input, select {
      width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0;
      border-radius: 8px; font-size: 15px; transition: border-color .2s;
      font-family: inherit; color: #1a1a1a; background: white;
    }
    input:focus, select:focus { outline: none; border-color: #3399CC; box-shadow: 0 0 0 3px rgba(51,153,204,.1); }

    /* Destination toggle */
    .dest-group { margin-bottom: 20px; }
    .dest-label { font-size: 14px; font-weight: 500; color: #333; margin-bottom: 10px; display: block; }
    .dest-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .dest-btn {
      padding: 11px 12px; border: 2px solid #e0e0e0; border-radius: 8px;
      font-size: 13px; font-family: inherit; font-weight: 500; color: #555;
      background: white; cursor: pointer; text-align: center; transition: all .15s;
    }
    .dest-btn:hover { border-color: #3399CC; color: #3399CC; }
    .dest-btn.active { border-color: #333399; background: #eeeef8; color: #333399; }
    .dest-btn.disabled { opacity: .45; cursor: not-allowed; }
    .dest-locked { font-size: 11px; color: #999; text-align: center; margin-top: 6px; display: none; }

    .btn {
      width: 100%; padding: 13px; background: linear-gradient(135deg, #333399, #3399CC);
      color: white; border: none; border-radius: 8px; font-size: 15px;
      font-family: inherit; font-weight: 600; cursor: pointer; transition: opacity .15s;
    }
    .btn:hover { opacity: .9; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .error { background: #fee2e2; color: #7f1d1d; padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-bottom: 16px; display: none; }
    .error.show { display: block; }
    .loading { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.4); border-top-color: white; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .footer { text-align: center; margin-top: 24px; color: #999; font-size: 12px; }
    .forgot { text-align: center; margin-top: 14px; }
    .forgot a { color: #3399CC; font-size: 14px; text-decoration: none; font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="images/dynamic-logo-2.png" alt="Dynamic Health Consultancy" onerror="this.style.display='none'">
      <p>Inlogportaal</p>
    </div>

    <div id="errorDiv" class="error"></div>

    <div class="form-group">
      <label for="email">E-mailadres</label>
      <input type="email" id="email" placeholder="naam@praktijk.nl" autocomplete="email" required>
    </div>

    <div class="form-group">
      <label for="password">Wachtwoord</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
    </div>

    <div class="dest-group">
      <span class="dest-label">Ik wil naar:</span>
      <div class="dest-options">
        <button class="dest-btn active" id="destDashboard" onclick="setDest('dashboard')">Dashboard</button>
        <button class="dest-btn" id="destNazorg" onclick="setDest('nazorg')">Nazorg portaal</button>
      </div>
      <div class="dest-locked" id="nazorgLocked">Geen nazorg licentie op dit account</div>
    </div>

    <button class="btn" id="loginBtn" onclick="doLogin()">Inloggen</button>

    <div class="forgot">
      <a href="/forgot-password.html">Wachtwoord vergeten?</a>
    </div>

    <div class="footer">© Dynamic Health Consultancy</div>
  </div>

  <script>
    let destination = 'dashboard';
    let nazorgAllowed = null;

    function setDest(dest) {
      destination = dest;
      document.getElementById('destDashboard').classList.toggle('active', dest === 'dashboard');
      document.getElementById('destNazorg').classList.toggle('active', dest === 'nazorg');
    }

    async function checkSession() {
      try {
        const res = await fetch('/api/auth/me', { credentials: 'include' });
        if (!res.ok) return;
        // Already logged in - check nazorg and redirect
        const data = await res.json();
        if (data.user) {
          const nzRes = await fetch('/api/auth/nazorg-check', { credentials: 'include' });
          const nz = await nzRes.json();
          nazorgAllowed = nz.allowed;
          updateNazorgButton();
          // Redirect to previously chosen destination or default
          const saved = sessionStorage.getItem('loginDest');
          if (saved === 'nazorg' && nazorgAllowed) window.location.href = '/nazorg-portaal.html';
          else window.location.href = '/churn-dashboard.html';
        }
      } catch {}
    }

    function updateNazorgButton() {
      const btn = document.getElementById('destNazorg');
      const locked = document.getElementById('nazorgLocked');
      if (nazorgAllowed === false) {
        btn.classList.add('disabled');
        btn.onclick = null;
        locked.style.display = 'block';
        if (destination === 'nazorg') setDest('dashboard');
      } else {
        btn.classList.remove('disabled');
        btn.onclick = () => setDest('nazorg');
        locked.style.display = 'none';
      }
    }

    async function doLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('errorDiv');

      if (!email || !password) { showError('Vul e-mailadres en wachtwoord in.'); return; }

      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span> Inloggen...';
      err.classList.remove('show');

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (!res.ok) {
          showError(data.error || 'Inloggen mislukt. Controleer je gegevens.');
          btn.disabled = false;
          btn.innerHTML = 'Inloggen';
          return;
        }

        // Check nazorg licentie na succesvol inloggen
        if (destination === 'nazorg') {
          const nzRes = await fetch('/api/auth/nazorg-check', { credentials: 'include' });
          const nz = await nzRes.json();
          if (!nz.allowed) {
            showError('Je hebt geen toegang tot het nazorg portaal. Neem contact op met Dynamic Health Consultancy.');
            btn.disabled = false;
            btn.innerHTML = 'Inloggen';
            return;
          }
          sessionStorage.setItem('loginDest', 'nazorg');
          window.location.href = '/nazorg-portaal.html';
        } else {
          sessionStorage.setItem('loginDest', 'dashboard');
          window.location.href = '/churn-dashboard.html';
        }
      } catch {
        showError('Netwerkfout. Probeer opnieuw.');
        btn.disabled = false;
        btn.innerHTML = 'Inloggen';
      }
    }

    function showError(msg) {
      const err = document.getElementById('errorDiv');
      err.textContent = msg;
      err.classList.add('show');
    }

    document.addEventListener('keypress', e => { if (e.key === 'Enter') doLogin(); });
    checkSession();
  </script>
</body>
</html>
